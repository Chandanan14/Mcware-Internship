<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(to right, #4facfe, #00f2fe);
}

/* 🎥 Video background */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 🌑 Overlay for readability */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 0;
}

.app {
  text-align: center;
  padding: 20px;
  position: relative;
  z-index: 1;
  max-width: 500px;
  margin: auto;
}

.search-box {
  margin-bottom: 20px;
}
.search-box input {
  padding: 10px;
  width: 200px;
  border-radius: 20px;
  border: none;
  outline: none;
}
.search-box button {
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  margin-left: 10px;
  cursor: pointer;
}

.valid-box {
  margin-bottom: 10px;
  color: #ff6a6a;
}

.dashboard {
  max-width: 400px;
  margin: auto;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
}

.location h2 {
  margin: 0;
  font-size: 45px;
}

.main-weather h1 {
  font-size: 35px;
  margin: 10px 0;
}

.main-weather img {
  width: 80px;
}

.details {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
}

#curloc {
  margin-left: 10px;
  display: block;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  color: #fff;
}

.curloc-box {
  margin-bottom: 20px;
  display: flex;
  justify-content: center;
}

.forecast {
  display: flex;
  justify-content: center;
  overflow-x: auto;
  gap: 10px;
  margin-top: 20px;
  padding: 10px;
}

.forecast-card {
  min-width: 100px;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.tips-box {
  margin-top: 20px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
}

#tips {
  color: #fff;
}

.wind-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  width: 200px;
}

#windImg {
    width: 120px;
    height: 120px;
    object-fit: contain;
    
}

@keyframes spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

.wind-box {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}



#soundToggle {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 1000;
}

</style>
</head>

<body>

<!-- 🎥 Background Video -->
<video id="bg-video" src="" autoplay muted loop></video>


<audio id="bgAudio" loop>
    <source src="rain.mp3" type="audio/mp3">
</audio>

<button id="soundToggle">🔊 Sound</button>

<div class="app">

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Search city..." autocomplete="on">
    <button onclick="showWeather()">Search</button>
  </div>

  <div class="curloc-box">
    <button id="curloc" onclick="getCurrentLocation()">Use My Location📍</button>
  </div>

  <div class="valid-box"></div>

  <div class="dashboard">

    <div class="location">
      <h2 id="place-name">City</h2>
      <p id="time">Local Time</p>
    </div>

    <div class="main-weather">
      <h1 id="temp">--°C</h1>
      <img id="icon" src="" alt="">
      <p id="condition">Condition</p>
    </div>

    <div class="details">
      <div class="card">
        <p>Humidity</p>
        <h3 id="humidity">--</h3>
      </div>
      <div class="card">
        <p>Wind</p>
        <h3 id="wind">--</h3>
      </div>
      <div class="card">
        <p>Feels Like</p>
        <h3 id="feels">--</h3>
      </div>
      <div class="card">
        <p>UV Index</p>
        <h3 id="uv">--</h3>
      </div>
    </div>

  </div>

  <div class="tips-box">
   <p>💡 Today’s Tip</p>
    <span id="tips"> </span>
  </div>

  <div class="forecast" id="forecast"></div>

<div class="wind-box">
<div class="wind-container">
    <img id="windImg" src="videos/wind.png" alt="Wind Wheel" />
    <p id="windText"></p>
</div>
</div>  


</div>

<script>

let validBox = document.querySelector(".valid-box");
let placeName = document.getElementById("place-name");
let time = document.getElementById("time");
let temp = document.getElementById("temp");
let icon = document.getElementById("icon");
let condition = document.getElementById("condition");
let humidity = document.getElementById("humidity");
let wind = document.getElementById("wind");
let feels = document.getElementById("feels");
let uv = document.getElementById("uv");
let curlocBtn = document.getElementById("curloc");
let forecastBox = document.getElementById("forecast");
let tips = document.getElementById("tips");



const audio = document.getElementById("bgAudio");
const btn = document.getElementById("soundToggle");

function setSound(conditionText) {
    const audio = document.getElementById("bgAudio");

    let condition = conditionText.toLowerCase();

    if (condition.includes("rain")) {
        audio.src = "videos/rain-sound.mp3";
    } 
    else if (condition.includes("cloud")) {
        audio.src = "videos/cloudy-sound.mp3";
    } 
    else if (condition.includes("sun")) {
        audio.src = "videos/sunny-sound.mp3";
    } 
    else {
        audio.src = "videos/wind-sound.mp3";
    }

    audio.load();   
    audio.play().catch(err => {
        console.log("Autoplay blocked:", err);
    });
}

btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        btn.textContent = "🔊 Sound";
    } else {
        audio.pause();
        btn.textContent = "🔇 Mute";
    }
});


tips.textContent = "Search a city to get tips 💡";

function setTips(conditionText) {
    let text = conditionText.toLowerCase();
if (text.includes("rain")) {
    tips.textContent = "Rainy vibes 🌧️ Grab an umbrella and maybe enjoy some chai ☕";
} 
else if (text.includes("sun") || text.includes("clear")) {
    tips.textContent = "Bright day ahead ☀️ Sunglasses on, stay hydrated, and enjoy the sunshine 😎";
} 
else if (text.includes("cloud")) {
    tips.textContent = "Cloudy skies ☁️ Perfect weather to relax or get cozy indoors 🛋️";
} 
else if (text.includes("thunder")) {
    tips.textContent = "Storm alert ⚡ Stay safe indoors and unplug sensitive devices 🔌";
} 
else if (text.includes("wind")) {
    tips.textContent = "Windy out there 🌬️ Hold onto your hat and avoid loose items!";
} 
else if (text.includes("mist") || text.includes("fog")) {
    tips.textContent = "Low visibility 🌫️ Travel carefully and keep headlights on 🚗";
} 
else if (text.includes("snow")) {
    tips.textContent = "Snowy day ❄️ Stay warm and enjoy the winter vibes ⛄";
} 
else {
    tips.textContent = "Looks like a normal day 🌤️ Go out and make it awesome!";
}
}

curlocBtn.addEventListener("click", () => {
    getCurrentLocation();
});
function getCurrentLocation() {
    if (!navigator.geolocation) {
        validBox.textContent = "Geolocation is not supported by this browser.";
        return;
    }

    // Show loading message
    validBox.textContent = "Getting your location...";

    navigator.geolocation.getCurrentPosition(
        async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // Fetch weather using coordinates
            const weatherData = await fetchData(`${lat},${lon}`);

            if (weatherData) {
                placeName.textContent = `${weatherData.location.name}, ${weatherData.location.country}`;
                time.textContent = weatherData.location.localtime;
                temp.textContent = weatherData.current.temp_c + "°C";
                icon.src = "https:" + weatherData.current.condition.icon;
                condition.textContent = weatherData.current.condition.text;
                humidity.textContent = weatherData.current.humidity + "%";
                wind.textContent = weatherData.current.wind_kph + " kph";
                feels.textContent = weatherData.current.feelslike_c + "°C";
                uv.textContent = weatherData.current.uv;
                showForecast(weatherData);
                setSound(weatherData.current.condition.text);
                setTips(weatherData.current.condition.text);
                // Background updates
                setVideo(weatherData.current.condition.text);
                // setBackground(weatherData.current.condition.text);

                validBox.textContent = ""; // clear message
            }
        },
        (error) => {
            // Handle denied or failed location
            validBox.textContent = "Location access denied. Please search manually.";
        }
    );
}

cityInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        if (cityInput.value.trim() !== "") {
            showWeather();
        } else {
            getCurrentLocation();
        }
    }
});

async function fetchData(city) {
    try {
        if (!city) {
            validBox.textContent = "Please enter a city name";
            return null;
        }

        const response = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=e66e04638e8c42038b6120743252609&q=${city}&days=7&aqi=yes`);
                                             
        const data = await response.json();
        updateWindWheel(data.current.wind_kph);

        if (data.error) {
            validBox.textContent = "Place not found!";
            return null;
        }

        validBox.textContent = "";
        return data;

    } catch (error) {
        validBox.textContent = "Unable to fetch data";
    }
}

async function showWeather() {
    let cityInput = document.getElementById("cityInput");
    let city = cityInput.value;

    const weatherData = await fetchData(city);

    if (weatherData) {
        placeName.textContent = `${weatherData.location.name}, ${weatherData.location.country}`;
        time.textContent = weatherData.location.localtime;
        temp.textContent = weatherData.current.temp_c + "°C";
        icon.src = "https:" + weatherData.current.condition.icon;
        condition.textContent = weatherData.current.condition.text;
        humidity.textContent = weatherData.current.humidity + "%";
        wind.textContent = weatherData.current.wind_kph + " kph";
        feels.textContent = weatherData.current.feelslike_c + "°C";
        uv.textContent = weatherData.current.uv;

        // 🎥 Video background (ACTIVE)
        setVideo(weatherData.current.condition.text);
        setSound(weatherData.current.condition.text);
        setTips(weatherData.current.condition.text);
        showForecast(weatherData);

        // 🎨 Gradient background (OPTIONAL - UNCOMMENT TO USE)
        // setBackground(weatherData.current.condition.text);

        cityInput.value = "";
    }
}

function showForecast(data) {
    forecastBox.innerHTML = "";

    let days = data.forecast.forecastday;

   days.forEach((day, index) => {
        let date = new Date(day.date);
        let dayName;

if (index === 0) {
    dayName = "Today";
} else if (index === 1) {
    dayName = "Tomorrow";
} else {
    let date = new Date(day.date);
    dayName = date.toLocaleDateString("en-US", { weekday: "short" });
}
        let card = document.createElement("div");
        card.classList.add("forecast-card");

        card.innerHTML = `
            <p>${dayName}</p>
            <img src="https:${day.day.condition.icon}" />
            <p>${day.day.maxtemp_c}° / ${day.day.mintemp_c}°</p>
        `;

        forecastBox.appendChild(card);
    });
}


/* 🎥 VIDEO BACKGROUND */
function setVideo(conditionText) {
    let condition = conditionText.toLowerCase();
    let video = document.getElementById("bg-video");

    if (condition.includes("rain")) {
        video.src = "videos/rain.mp4";
        
    } 
    else if (condition.includes("cloud")) {
        video.src = "videos/cloudy.mp4";
       
    } 
    else if (condition.includes("sun")) {
        video.src = "videos/sunny.mp4";
        
    } 
    else {
        video.src = "videos/clear.mp4";
       
    }

    video.load();
}

/* 🎨 GRADIENT BACKGROUND (OPTIONAL) */
function setBackground(conditionText) {
    let condition = conditionText.toLowerCase();

    if (condition.includes("sunny")) {
        document.body.style.background = "linear-gradient(to right, #fceabb, #f8b500)";
    } 
    else if (condition.includes("rain")) {
        document.body.style.background = "linear-gradient(to right, #4e54c8, #8f94fb)";
    } 
    else if (condition.includes("cloud")) {
        document.body.style.background = "linear-gradient(to right, #bdc3c7, #2c3e50)";
    } 
    else if (condition.includes("clear")) {
        document.body.style.background = "linear-gradient(to right, #56ccf2, #2f80ed)";
    } 
    else {
        document.body.style.background = "linear-gradient(to right, #4facfe, #00f2fe)";
    }
}
function updateWindWheel(wind_kph) {
    const img = document.getElementById("windImg");
    const text = document.getElementById("windText");

    let duration;

    if (wind_kph < 5) {
        duration = 6;
    } 
    else if (wind_kph < 15) {
        duration = 3;
    } 
    else if (wind_kph < 30) {
        duration = 1.5;
    } 
    else {
        duration = 0.8;
    }

    img.style.animation = `spin ${duration}s linear infinite`;

    text.textContent = `Wind Speed: ${wind_kph} kph 🌬️`;
}

</script>

</body>
</html>
