 var map = L.map('map').setView([12.9629, 77.5775], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);


// Add OpenTopoMap layer
var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
	maxZoom: 17,
	attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
});

// Add Google Streets layer
googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
});

googleStreets.addTo(map);

// Add Google Satellite layer
googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
});

//googleSat.addTo(map);

var myIcon = L.icon({
    iconUrl: 'assets/icon.png',
    iconSize: [30, 55],
});

var nexrad = L.tileLayer.wms("http://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
    layers: 'nexrad-n0r-900913',
    format: 'image/png',
    transparent: true,
    attribution: "Weather data © 2012 IEM Nexrad"
});

L.marker([50.505, 30.57], {icon: myIcon}).addTo(map);

var marker = L.marker([12.9629, 77.5775], {icon: myIcon}).addTo(map);

marker.bindPopup("this is namma bengaluru!" + "<br>" + marker.getLatLng()).openPopup();

console.log(marker.toGeoJSON());


var baseMaps = {
    "OpenStreetMap": OpenTopoMap,
    "Google Streets": googleStreets,
    "Google Satellite": googleSat,
    "Nexrad": nexrad
};

var overlayMaps = {
    "Marker": marker
};

L.control.layers(baseMaps, overlayMaps).addTo(map);

L.geoJSON(pointsJson).addTo(map);
L.geoJSON(polygonJson,{
    onEachFeature: function(feature, layer) {
        layer.bindPopup("Name: " + feature.properties.name);
    },
    style: {
        color: "red",
        weight: 2
    }
}).addTo(map);
L.geoJSON(circleJson).addTo(map);
