<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Facts</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background-color: #ffc8fb;
            min-height: 100vh;
        }

        h1{
            color: #d7056e;
            font-size: 4rem;
        }

        button{
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #d7056e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .fact {
            margin-top: 20px;
            background-color: white;
            padding: 10px 30px;
            border-radius: 5px;
            border: 2px dashed #d7056e;
            width: 50vw;
            padding: 20px;
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>Cat Fact</h1>
    <button onclick="getCatFact()">Get Cat Fact</button>
    <div class="fact"></div>
    <script>
async function getCatFact() {
    try {
        const res = await fetch("https://catfact.ninja/fact");
        const data = await res.json();

        let factElement = document.querySelector(".fact");
        factElement.textContent = data.fact;
        factElement.style.display = "block";

    } catch (error) {
        console.log("sry api failed! meow!");
        document.querySelector(".fact").textContent = "sry api failed! meow!";
    }
}
</script>
</body>
</html>
