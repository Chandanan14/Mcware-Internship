<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/6d8cfc752c.js" crossorigin="anonymous"></script>
    

    
</head>
<body>
    
<div class="container">

    <div class="left">
 
        <img src="img1.png" id="i1">

        <p style="white-space: nowrap; font-size: 16px;"><b>Integrated Data Management Software </b></p>

         <img src="img2.png" id="i2">

    </div>

    <div class="right">

        <p id="heading">Admin Login</p>

        
        <label for="email" id="label1">Email Address  <span style=" color: #dc3545; ">*</span>  </label> 

        <div class="wrap">
        <i class="fa-solid fa-envelope"></i>   
        <input type="text" name="email" placeholder="Enter Email Id" required id="email">
        </div>

        
        <label for="password" id="label2" >Password   <span style=" color: #dc3545; ">*</span>  </label>

        <div class="wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="Password" placeholder="*********" required id="password">
        <i class="fa-solid fa-eye" id="togglePassword" ></i>

        </div>
       

        <div class="end">

             <a href="#" id="fp">
            <p>
                Forgot Password?
            </p>
        </a>

        <button id="btn">Login</button>


    
        </div>
       

         <p id="errorMessage" style="color: red; margin-left: 0px; font-size: 14px;"></p>


    </div>


</div>


 <script src="new.js" ></script>




</body>
</html>
