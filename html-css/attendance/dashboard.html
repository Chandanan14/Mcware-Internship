<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WorkTrack - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
        }

        h1{
            background-color: rgb(130, 130, 229);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container{
            width: 70%;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 20px 40px -20px;
        }

        
        button{
            padding: 8px 15px;
            background-color: rgb(130, 130, 229);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background-color: rgb(100, 100, 200);
        }

        .logout-btn{
            margin-top: 20px;
            float: right;
            margin-right: 200px;
        }
        .wrap{
            display: flex;
            flex-direction: row;
        }

        nav{
            display: flex;
            flex-direction: column;
            width: 300px;
            height: 100vh;
             background-color: white;
             box-shadow: rgba(50, 50, 93, 0.25) 0px 20px 40px -20px;
             border-top-right-radius:15px;
             border-bottom-right-radius: 15px;
        }

        nav a:hover { background-color: #e6e6fa; 
            padding: 10px; 
            border-radius: 8px;
         }

        ul{
            margin-top: 50px;
        }

        a{
            text-decoration: none;
            font-size: 1.6rem;
        }

        li{
            list-style: none;
        }


        .summary{
            display: flex;
            flex-direction: row;
            
        }
        .sum{
            width: 200px;
            background-color: white;
            height: 100px;
            font-size: 20px;
            text-align: center;
            padding: 20px;
            margin: 30px;
            border-radius: 15px;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 20px 40px -20px;
        }
       
    </style>
</head>
<body>
    <header>

<h1>WorkTrack Dashboard</h1>

    </header>

    <div class="wrap">

         <nav>
        <ul>
            <li><a href="">Home</a> </li>
            <li><a href="">Attendance Tracker</a> </li>
            <li><a href=""> <button class="logout-btn">Logout</button> </a></li>

        </ul>
    </nav>

    <div class="summary">
        <div class="sum">
            <p>Total Employees:</p>
            <span></span>
        </div>
        <div class="sum">
            <p>Total Present Today:</p>
            <span></span>
        </div>
        <div class="sum">
            <p>Total Absent Today:</p>
            <span></span>
        </div>
    </div>

    </div>

   
</body>
</html>
