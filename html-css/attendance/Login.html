<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTrack - Login</title>
    <style>

        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: aliceblue;
        }

        .container{
            display: flex;
            flex-direction: column;
            width: 500px;
            height: 400px;
            border: none;
            padding: 20px;
            border-radius: 30px;
            background-color:rgb(255, 255, 255);
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;

        }

         h2{
            text-align: center;
         }

        label{
            margin-top: 20px;
            font-size: 20px;
            display: block;
            margin-left: 90px;

        }

        input{
            font-size: 18px;
            padding: 10px;
            margin-top: 20px;
             border-radius: 8px;
            margin-left: 90px;
            border: 2px solid #ccc;
            width: 300px;

        }

        button{
            font-size: 20px;
            display: block;
            padding: 8px;
            border-radius: 20px;
            width: 100px;
            margin-top: 30px;
            margin-left: 200px;
            background-color: rgb(130, 130, 229);
            color: white;
            cursor: pointer;

        }

        .e-label{
            margin-top: 10px;
            
        }

         .login-link{
            margin-top: 15px;
            text-align: center;
             font-size: 20px;
        }

        .login-link a{
            text-decoration: none;
            color: rgb(130, 130, 229);
           
        }

        
        @media (max-width: 576px) { 
            .container{
                width: 100%;
                height: auto;
                display: flex;
                flex-direction: column;

            }

            button{
                margin: 1em 0px;
                text-align: center;
            }

            input{
                width: 90%;
                margin: 0;
            }

            label{
                margin:1em 0px;
        }

    }

    </style>
</head>
<body>
    <div class="container">

         <h2>Login Account</h2>

        <form>

            <label for="email" class="e-label">Email Address:</label>

            <input type="email" placeholder="enter your email" required class="email" name="email">

            <label for="password" class="p-label">Password:</label>


            <input type="password" placeholder="********" required  class="password" name="password"> 

            <button>Login</button>

        </form>

        <div class="login-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>

    </div>

    
<script>

const form = document.querySelector("form");

form.addEventListener("submit", function(event) {
    event.preventDefault(); // stop page refresh

    const email = document.querySelector("input[name='email']").value.toLowerCase().trim();
    const password = document.querySelector("input[name='password']").value;

    // Get users from localStorage
    const users = JSON.parse(localStorage.getItem("users")) || [];

    // Find user by email
    const user = users.find(u => u.email.toLowerCase() === email);

    if (!user) {
        alert("Email not registered!");
        return;
    }

    if (user.password !== password) {
        alert("Incorrect password!");
        return;
    }

    // If both match
    alert("Login successful!");
     window.location.href = "dashboard.html";
});




</script>

</body>
</html>
